<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Invo - App Icon Standalone (i): polished-gold serif "i" on a warm-dark
       charcoal tile. Faithful recreation of the design handoff .dc.html. -->
  <defs>
    <!-- tile: CSS linear-gradient(150deg, #242427 → #161617 → #0c0c0d → #050505) -->
    <linearGradient id="tile" x1="0.158" y1="-0.092" x2="0.842" y2="1.092">
      <stop offset="0" stop-color="#242427"/>
      <stop offset="0.40" stop-color="#161617"/>
      <stop offset="0.72" stop-color="#0c0c0d"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <!-- white inset highlight along the top edge -->
    <linearGradient id="topSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.10" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- dark inset shadow along the bottom edge -->
    <linearGradient id="botShade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#000000" stop-opacity="0.78"/>
      <stop offset="0.18" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <!-- radial vignette: transparent center → darker edges -->
    <radialGradient id="vig" cx="512" cy="430" r="799" gradientUnits="userSpaceOnUse">
      <stop offset="0.36" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.5"/>
    </radialGradient>
    <!-- warm gold top specular sheen -->
    <radialGradient id="topGold" cx="512" cy="-348" r="758" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8e09e" stop-opacity="0.20"/>
      <stop offset="0.70" stop-color="#f8e09e" stop-opacity="0"/>
    </radialGradient>
    <!-- warm gold floor glow -->
    <radialGradient id="botGold" cx="512" cy="1352" r="635" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c9a24b" stop-opacity="0.18"/>
      <stop offset="0.72" stop-color="#c9a24b" stop-opacity="0"/>
    </radialGradient>

    <!-- polished-metal gold: light → deep → bright band → deep -->
    <linearGradient id="goldMetal" x1="0.08" y1="0" x2="0.34" y2="1">
      <stop offset="0" stop-color="#fff6da"/>
      <stop offset="0.18" stop-color="#f6dd97"/>
      <stop offset="0.40" stop-color="#d9ad57"/>
      <stop offset="0.55" stop-color="#b88a38"/>
      <stop offset="0.66" stop-color="#f0cd83"/>
      <stop offset="0.82" stop-color="#c79a47"/>
      <stop offset="1" stop-color="#9c722a"/>
    </linearGradient>
    <!-- inner top highlight for the bevel -->
    <linearGradient id="goldSpec" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- dark drop shadow + warm gold glow under the glyph -->
    <filter id="ish" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="26" result="gb"/>
      <feFlood flood-color="#d6b05a" flood-opacity="0.30"/>
      <feComposite in2="gb" operator="in" result="glow"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="sb"/>
      <feOffset in="sb" dx="0" dy="26" result="sbo"/>
      <feFlood flood-color="#000000" flood-opacity="0.50"/>
      <feComposite in2="sbo" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- tile + layered overlays -->
  <rect width="1024" height="1024" fill="url(#tile)"/>
  <rect width="1024" height="1024" fill="url(#topSheen)"/>
  <rect width="1024" height="1024" fill="url(#botShade)"/>
  <rect width="1024" height="1024" fill="url(#vig)"/>
  <rect width="1024" height="1024" fill="url(#topGold)"/>
  <rect width="1024" height="1024" fill="url(#botGold)"/>

  <!-- the "i" at 62% height, centered (filter in 1024 space, glyph scaled inside) -->
  <g filter="url(#ish)">
    <g transform="translate(284.25 194.56) scale(3.4504)">
      <g fill="url(#goldMetal)">
        <g transform="translate(66 34)"><path d="M0,-19 C3,-6.8 6.8,-3 19,0 C6.8,3 3,6.8 0,19 C-3,6.8 -6.8,3 -19,0 C-6.8,-3 -3,-6.8 0,-19 Z"/></g>
        <rect x="59.5" y="70" width="13" height="86" rx="3"/>
        <rect x="49" y="68" width="34" height="6" rx="3"/>
        <rect x="43" y="151" width="46" height="7.5" rx="3.75"/>
      </g>
      <g fill="url(#goldSpec)" opacity="0.9">
        <rect x="60.5" y="71" width="11" height="4" rx="2"/>
        <rect x="50" y="69" width="32" height="2.4" rx="1.2"/>
      </g>
      <g transform="translate(66 34)" fill="#fff7e0" opacity="0.85">
        <path d="M0,-19 C1.9,-11 4.4,-6.6 9.5,-4.4 C4.4,-5.5 1.9,-8.8 0,-14 C-1.9,-8.8 -4.4,-5.5 -9.5,-4.4 C-4.4,-6.6 -1.9,-11 0,-19 Z"/>
      </g>
    </g>
  </g>
</svg>
