<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Android adaptive FOREGROUND: the polished-gold serif "i" only, on a
       transparent canvas, sized ~72% so it sits inside the adaptive safe zone. -->
  <defs>
    <linearGradient id="goldMetal" x1="0.08" y1="0" x2="0.34" y2="1">
      <stop offset="0" stop-color="#fff6da"/>
      <stop offset="0.18" stop-color="#f6dd97"/>
      <stop offset="0.40" stop-color="#d9ad57"/>
      <stop offset="0.55" stop-color="#b88a38"/>
      <stop offset="0.66" stop-color="#f0cd83"/>
      <stop offset="0.82" stop-color="#c79a47"/>
      <stop offset="1" stop-color="#9c722a"/>
    </linearGradient>
    <linearGradient id="goldSpec" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ish" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22" result="gb"/>
      <feFlood flood-color="#d6b05a" flood-opacity="0.30"/>
      <feComposite in2="gb" operator="in" result="glow"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="sb"/>
      <feOffset in="sb" dx="0" dy="20" result="sbo"/>
      <feFlood flood-color="#000000" flood-opacity="0.45"/>
      <feComposite in2="sbo" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#ish)">
    <g transform="translate(247.54 143.36) scale(4.007)">
      <g fill="url(#goldMetal)">
        <g transform="translate(66 34)"><path d="M0,-19 C3,-6.8 6.8,-3 19,0 C6.8,3 3,6.8 0,19 C-3,6.8 -6.8,3 -19,0 C-6.8,-3 -3,-6.8 0,-19 Z"/></g>
        <rect x="59.5" y="70" width="13" height="86" rx="3"/>
        <rect x="49" y="68" width="34" height="6" rx="3"/>
        <rect x="43" y="151" width="46" height="7.5" rx="3.75"/>
      </g>
      <g fill="url(#goldSpec)" opacity="0.9">
        <rect x="60.5" y="71" width="11" height="4" rx="2"/>
        <rect x="50" y="69" width="32" height="2.4" rx="1.2"/>
      </g>
      <g transform="translate(66 34)" fill="#fff7e0" opacity="0.85">
        <path d="M0,-19 C1.9,-11 4.4,-6.6 9.5,-4.4 C4.4,-5.5 1.9,-8.8 0,-14 C-1.9,-8.8 -4.4,-5.5 -9.5,-4.4 C-4.4,-6.6 -1.9,-11 0,-19 Z"/>
      </g>
    </g>
  </g>
</svg>
