<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  ::-webkit-scrollbar{ width:0; height:0; }
</style>
</helmet>

<div style="min-height:100vh; background:radial-gradient(1100px 600px at 85% -12%, #cfe6dd 0%, transparent 58%), linear-gradient(160deg,#f4f0e7,#e7efe9); font-family:'Manrope',system-ui,sans-serif; color:#16312a; padding:54px 40px 90px;">

  <div style="max-width:1080px; margin:0 auto; text-align:center;">
    <div style="font-size:12px; font-weight:800; letter-spacing:.26em; text-transform:uppercase; color:#0f7a66;">Invo &middot; Identity</div>
    <div style="font-family:'Marcellus',serif; font-size:33px; margin-top:10px; letter-spacing:-.01em;">The Invo mark</div>
  </div>

  <!-- ===== HERO ===== -->
  <div style="max-width:1080px; margin:34px auto 0; display:flex; flex-direction:column; align-items:center;">
    <div style="position:relative; display:flex; flex-direction:column; align-items:center;">
      <div style="position:absolute; inset:-40px; background:radial-gradient(circle, rgba(201,162,75,.26), transparent 68%); filter:blur(12px);"></div>
      <!-- emblem -->
      <div style="position:relative; width:200px; height:200px; border-radius:50px; background:radial-gradient(130% 130% at 30% 22%, #1a8a76 0%, #0c4a40 72%); box-shadow:0 30px 60px -22px rgba(11,40,33,.65), inset 0 2px 3px rgba(255,255,255,.12);">
        <div style="position:absolute; inset:14px; border-radius:38px; border:1.5px solid rgba(224,192,116,.5);"></div>
        <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center;">
          <div style="position:relative; width:104px; height:104px; border-radius:50%; border:6px solid #c9a24b; display:flex; align-items:center; justify-content:center; box-shadow:0 0 0 1px rgba(224,192,116,.25), inset 0 0 0 1px rgba(224,192,116,.25);">
            <span style="font-size:36px; color:#e6c879; line-height:1;">&#10038;</span>
          </div>
        </div>
      </div>
      <!-- wordmark -->
      <div style="margin-top:32px; display:flex; align-items:center; justify-content:center;">
        <span style="font-family:'Marcellus',serif; font-size:58px; letter-spacing:.04em; color:#16312a; line-height:1;">INV</span>
        <span style="display:inline-flex; align-items:center; justify-content:center; width:48px; height:48px; border-radius:50%; border:5px solid #c9a24b; margin-left:6px;"></span>
      </div>
      <div style="display:flex; align-items:center; justify-content:center; gap:12px; margin-top:14px;">
        <span style="width:36px; height:1px; background:linear-gradient(90deg,transparent,#c9a24b);"></span>
        <span style="font-size:11.5px; font-weight:700; letter-spacing:.42em; color:#0f7a66; padding-left:.42em; white-space:nowrap; flex-shrink:0;">SALON POS</span>
        <span style="width:36px; height:1px; background:linear-gradient(90deg,#c9a24b,transparent);"></span>
      </div>
    </div>
  </div>

  <!-- ===== LOCKUPS ===== -->
  <div style="max-width:1080px; margin:52px auto 0; display:grid; grid-template-columns:1fr 1fr; gap:22px;">
    <div style="background:#fff; border-radius:22px; padding:34px; box-shadow:0 16px 36px -22px rgba(11,40,33,.5); display:flex; align-items:center; gap:18px; justify-content:center;">
      <div style="position:relative; width:64px; height:64px; border-radius:17px; background:radial-gradient(130% 130% at 30% 22%, #1a8a76, #0c4a40); flex-shrink:0;">
        <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center;"><span style="width:34px; height:34px; border-radius:50%; border:4px solid #c9a24b; display:flex; align-items:center; justify-content:center;"><span style="font-size:12px; color:#e6c879;">&#10038;</span></span></div>
      </div>
      <div style="display:flex; align-items:center;"><span style="font-family:'Marcellus',serif; font-size:34px; letter-spacing:.03em;">INV</span><span style="display:inline-flex; width:27px; height:27px; border-radius:50%; border:3.5px solid #c9a24b; margin-left:4px;"></span></div>
    </div>
    <div style="background:#0b211c; border-radius:22px; padding:34px; box-shadow:0 16px 36px -22px rgba(11,40,33,.6); display:flex; align-items:center; gap:18px; justify-content:center;">
      <div style="position:relative; width:64px; height:64px; border-radius:17px; background:linear-gradient(150deg,#15806c,#0e5648); flex-shrink:0;">
        <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center;"><span style="width:34px; height:34px; border-radius:50%; border:4px solid #c9a24b; display:flex; align-items:center; justify-content:center;"><span style="font-size:12px; color:#e6c879;">&#10038;</span></span></div>
      </div>
      <div style="display:flex; align-items:center;"><span style="font-family:'Marcellus',serif; font-size:34px; letter-spacing:.03em; color:#f6f1e8;">INV</span><span style="display:inline-flex; width:27px; height:27px; border-radius:50%; border:3.5px solid #c9a24b; margin-left:4px;"></span></div>
    </div>
  </div>

  <!-- ===== VARIATIONS ===== -->
  <div style="max-width:1080px; margin:22px auto 0; display:grid; grid-template-columns:repeat(4,1fr); gap:18px;">
    <div style="aspect-ratio:1; border-radius:20px; background:linear-gradient(150deg,#15705f,#0c4a40); display:flex; align-items:center; justify-content:center; box-shadow:0 14px 30px -20px rgba(11,40,33,.6);">
      <span style="width:96px; height:96px; border-radius:50%; border:7px solid #c9a24b; display:flex; align-items:center; justify-content:center;"><span style="font-size:34px; color:#e6c879;">&#10038;</span></span>
    </div>
    <div style="aspect-ratio:1; border-radius:20px; background:#f6f1e8; display:flex; align-items:center; justify-content:center; box-shadow:0 14px 30px -20px rgba(11,40,33,.4); border:1px solid #ece5d6;">
      <span style="width:96px; height:96px; border-radius:50%; border:7px solid #0e5648; display:flex; align-items:center; justify-content:center;"><span style="font-size:34px; color:#15806c;">&#10038;</span></span>
    </div>
    <div style="aspect-ratio:1; border-radius:20px; background:#0b211c; display:flex; align-items:center; justify-content:center; box-shadow:0 14px 30px -20px rgba(11,40,33,.6);">
      <span style="width:96px; height:96px; border-radius:50%; border:7px solid #c9a24b; display:flex; align-items:center; justify-content:center;"><span style="font-size:34px; color:#e6c879;">&#10038;</span></span>
    </div>
    <div style="aspect-ratio:1; border-radius:20px; background:#e7efe9; display:flex; align-items:center; justify-content:center; box-shadow:0 14px 30px -20px rgba(11,40,33,.4);">
      <div style="width:96px; height:96px; border-radius:24px; background:radial-gradient(130% 130% at 30% 22%, #1a8a76, #0c4a40); position:relative; box-shadow:0 12px 24px -10px rgba(14,86,72,.6);">
        <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center;"><span style="width:48px; height:48px; border-radius:50%; border:5px solid #c9a24b; display:flex; align-items:center; justify-content:center;"><span style="font-size:17px; color:#e6c879;">&#10038;</span></span></div>
      </div>
    </div>
  </div>

  <!-- ===== SPEC ===== -->
  <div style="max-width:1080px; margin:22px auto 0; background:#fff; border-radius:20px; padding:22px 26px; box-shadow:0 14px 30px -22px rgba(11,40,33,.5); display:flex; align-items:center; gap:24px; flex-wrap:wrap; justify-content:space-between;">
    <div style="display:flex; align-items:center; gap:12px;"><span style="width:34px; height:34px; border-radius:9px; background:#0e5648;"></span><div><div style="font-size:12.5px; font-weight:800;">Emerald</div><div style="font-size:11px; color:#a8b3ab; font-weight:600;">#0E5648</div></div></div>
    <div style="display:flex; align-items:center; gap:12px;"><span style="width:34px; height:34px; border-radius:9px; background:linear-gradient(150deg,#e6c879,#c9a24b);"></span><div><div style="font-size:12.5px; font-weight:800;">Champagne Gold</div><div style="font-size:11px; color:#a8b3ab; font-weight:600;">#C9A24B</div></div></div>
    <div style="display:flex; align-items:center; gap:12px;"><span style="width:34px; height:34px; border-radius:9px; background:#f6f1e8; border:1px solid #ece5d6;"></span><div><div style="font-size:12.5px; font-weight:800;">Cream</div><div style="font-size:11px; color:#a8b3ab; font-weight:600;">#F6F1E8</div></div></div>
    <div style="border-left:1px solid #eee7d9; padding-left:24px;"><div style="font-size:11px; color:#a8b3ab; font-weight:700; letter-spacing:.06em;">TYPEFACE</div><div style="font-family:'Marcellus',serif; font-size:18px; margin-top:2px;">Marcellus</div></div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1160,&quot;height&quot;:1240}}"></script>
</body>
</html>
